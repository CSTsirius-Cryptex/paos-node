<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=960">
  <title>PAOS Node 控制台</title>
  <link rel="stylesheet" href="/panel/fonts/fonts.css">
  <link rel="stylesheet" href="/panel/panel.css">
</head>
<body>

<div class="window" id="window">

  <!-- Tab bar -->
  <nav class="tabbar" id="tabbar">
    <button class="tab active" data-tab="status">
      <span class="ico"><svg viewBox="0 0 16 16" fill="none"><circle cx="4" cy="4" r="2" stroke="currentColor" stroke-width="1.4"/><circle cx="12" cy="4" r="2" stroke="currentColor" stroke-width="1.4"/><circle cx="4" cy="12" r="2" stroke="currentColor" stroke-width="1.4"/><circle cx="12" cy="12" r="2" stroke="currentColor" stroke-width="1.4"/></svg></span>
      <span>狀態總覽</span>
    </button>
    <button class="tab" data-tab="gpts">
      <span class="ico"><svg viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.4"/><circle cx="6" cy="7.5" r="1" fill="currentColor"/><circle cx="10" cy="7.5" r="1" fill="currentColor"/><path d="M8 1v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></span>
      <span>我的助理</span>
    </button>
    <button class="tab" data-tab="settings">
      <span class="ico"><svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M8 1v2M8 13v2M15 8h-2M3 8H1M13 3l-1.5 1.5M4.5 11.5L3 13M13 13l-1.5-1.5M4.5 4.5L3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></span>
      <span>設定</span>
    </button>
    <button class="tab" data-tab="logs">
      <span class="ico"><svg viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="10" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M5 7l1.5 1.5L5 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M8.5 10h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></span>
      <span>執行記錄</span>
    </button>
  </nav>

  <!-- Op banner (hidden by default, shown during long operations) -->
  <div id="op-banner" class="op-banner" hidden>
    <span class="op-spinner" id="op-spinner"></span>
    <span class="op-banner-msg" id="op-banner-msg"></span>
    <button class="op-banner-dismiss" id="op-banner-dismiss" title="關閉">✕</button>
  </div>

  <!-- Content area (filled by panel.js) -->
  <section class="content" id="content"></section>

</div>

<script src="/panel/panel.js"></script>
</body>
</html>
